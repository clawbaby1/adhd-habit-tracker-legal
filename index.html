<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADHD Habit Tracker Legal</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #18202a;
      --muted: #5b6470;
      --border: #d8e0ea;
      --accent: #0b6bcb;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(13, 34, 66, 0.06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }
    p {
      line-height: 1.7;
      color: var(--muted);
    }
    ul {
      padding-left: 20px;
    }
    li {
      margin: 12px 0;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>ADHD Habit Tracker Legal</h1>
      <p>Official legal and support pages for ADHD Habit Tracker.</p>
      <ul>
        <li><a href="./privacy.html">Privacy Policy</a></li>
        <li><a href="./terms.html">Terms of Use</a></li>
      </ul>
    </div>
  </main>
</body>
</html>
